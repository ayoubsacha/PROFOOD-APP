<header class="site-header">
  <div class="utility-bar" aria-label="Actions client">
    <div class="utility-bar__inner">
      <div class="utility-bar__left">
        <span class="flag" aria-hidden="true"></span>
        <button type="button" class="plain-control">
          Francais
          <span class="chevron" aria-hidden="true"></span>
        </button>
        <button type="button" class="plain-control">
          MAD
          <span class="chevron" aria-hidden="true"></span>
        </button>
      </div>

      <nav class="client-actions" aria-label="Navigation client">
        <a
          class="cart-button"
          routerLink="/client/dashboard"
          [queryParams]="{ tab: 'cart' }"
          aria-label="Aller au panier"
        >
          <img src="/assets/panier-icon.svg" alt="" />
        </a>

        <a
          class="profile-button top-button"
          routerLink="/client/dashboard"
          [queryParams]="{ tab: 'account' }"
          aria-label="Aller au profil"
        >
          @if (currentUser()?.profileImage) {
            <img [src]="currentUser()?.profileImage" alt="" />
          } @else {
            <span class="profile-fallback" aria-hidden="true"></span>
          }
          <span>Profile</span>
        </a>

        <button
          type="button"
          class="theme-button"
          [attr.aria-label]="darkMode() ? 'Activer le mode clair' : 'Activer le mode sombre'"
          (click)="toggleTheme()"
        >
          {{ darkMode() ? 'Light' : 'Theme' }}
        </button>

        <button type="button" class="logout-link top-button" (click)="logout()">Se deconnecter</button>
      </nav>
    </div>
  </div>
</header>
