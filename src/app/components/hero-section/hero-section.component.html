<section class="hero" aria-labelledby="hero-title">
  <div class="hero__shade"></div>

  <div class="hero__inner">
    <a class="hero-logo" href="#top" aria-label="ProFood accueil">ProFood</a>

    <form class="search-panel" aria-label="Recherche marketplace" (submit)="handleSearch($event)">
      <label class="search-panel__select">
        <span class="visually-hidden">Catégorie</span>
        <select name="category" aria-label="Catégorie">
          @for (category of categories; track category) {
            <option [value]="category">{{ category }}</option>
          }
        </select>
      </label>

      <label class="search-panel__input">
        <span class="visually-hidden">Recherche</span>
        <input name="query" type="search" placeholder="Que cherchez-vous ?" />
      </label>

      <button type="submit" aria-label="Rechercher">
        <span aria-hidden="true">⌕</span>
      </button>
    </form>

    <div class="hero__content">
      <h1 id="hero-title">
        Connectez le futur du<br />
        food business,<br />
        aujourd'hui.
      </h1>
      <p>
        ProFood rassemble l'ensemble de l'écosystème agroalimentaire sur une plateforme unique pour
        faciliter les échanges, les partenariats et la croissance des professionnels.
      </p>
    </div>

    <app-category-grid />

    <span class="visually-hidden" aria-live="polite">{{ searchSummary() }}</span>
  </div>
</section>
